{% extends "cms/base.html" %}

{% block title %}Ndalohet — Smart Library{% endblock %}

{% block content %}
  <section class="mx-auto max-w-3xl px-4 pt-12 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-slate-200 bg-white p-10 shadow-sm dark:border-slate-800 dark:bg-slate-950">
      <div class="text-sm font-semibold text-rose-600">Ndalohet</div>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">S’ke akses në këtë faqe.</h1>
      <p class="mt-4 text-sm text-slate-600 dark:text-slate-300">
        Ky panel është vetëm për stafin (Admin/Librarian). Nëse mendon që është gabim, kontakto administratorin.
      </p>
      <div class="mt-8 flex flex-col gap-3 sm:flex-row">
        <a href="/" class="rounded-2xl bg-brand-700 px-5 py-3 text-sm font-extrabold text-white shadow-sm hover:bg-brand-800">Kthehu te faqja</a>
        <a href="/admin/" class="rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-extrabold text-slate-800 shadow-sm hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100 dark:hover:bg-slate-900">Hyr në Admin</a>
      </div>
    </div>
  </section>
{% endblock %}
