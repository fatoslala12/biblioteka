{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block extrahead %}
  {{ block.super }}
  <style>
    /* Grupi – dizajn super modern */
    body.app-auth.model-group.change-form #content-main .card {
      border-radius: 20px !important;
      box-shadow: 0 16px 48px rgba(15,23,42,.08), 0 4px 16px rgba(15,23,42,.04) !important;
      border: 1px solid rgba(226,232,240,.9) !important;
      overflow: hidden;
    }
    body.app-auth.model-group.change-form #content-main .card-body {
      padding: 28px 32px !important;
    }
    body.app-auth.model-group.change-form .form-group label,
    body.app-auth.model-group.change-form .aligned label {
      font-weight: 800 !important;
      color: #0f172a !important;
    }
    body.app-auth.model-group.change-form #id_name {
      border-radius: 14px !important;
      padding: 12px 18px !important;
      font-weight: 600 !important;
      border: 1px solid rgba(148,163,184,.35) !important;
      font-size: 1rem !important;
    }
    body.app-auth.model-group.change-form #id_name:focus {
      border-color: #319189 !important;
      box-shadow: 0 0 0 3px rgba(49,145,137,.15) !important;
    }
    /* Selector widget – modern */
    body.app-auth.model-group.change-form .selector {
      display: flex !important;
      gap: 20px !important;
      margin-top: 20px !important;
    }
    body.app-auth.model-group.change-form .selector-available,
    body.app-auth.model-group.change-form .selector-chosen {
      flex: 1 1 0 !important;
      min-width: 0 !important;
      background: linear-gradient(180deg, #fafbfc 0%, #f1f5f9 100%) !important;
      border-radius: 16px !important;
      border: 1px solid rgba(148,163,184,.25) !important;
      overflow: hidden !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9) !important;
    }
    body.app-auth.model-group.change-form .selector-available-title,
    body.app-auth.model-group.change-form .selector-chosen-title {
      padding: 14px 18px !important;
      border-radius: 0 !important;
      border: none !important;
      font-weight: 800 !important;
    }
    body.app-auth.model-group.change-form .selector-available-title {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%) !important;
      color: #475569 !important;
    }
    body.app-auth.model-group.change-form .selector-chosen-title {
      background: linear-gradient(135deg, #319189 0%, #287a75 100%) !important;
      color: #fff !important;
    }
    body.app-auth.model-group.change-form .selector-available-title label,
    body.app-auth.model-group.change-form .selector-chosen-title label {
      color: inherit !important;
    }
    body.app-auth.model-group.change-form .selector .helptext {
      display: none !important;
    }
    body.app-auth.model-group.change-form .selector-available .help,
    body.app-auth.model-group.change-form .selector-chosen .help {
      font-size: 11px !important;
      color: #64748b !important;
    }
    body.app-auth.model-group.change-form .form-row {
      margin-bottom: 20px !important;
    }
    body.app-auth.model-group.change-form .form-group:first-of-type {
      margin-bottom: 24px !important;
    }
    body.app-auth.model-group.change-form .selector .selector-filter {
      padding: 12px 16px !important;
      border: none !important;
      border-bottom: 1px solid rgba(148,163,184,.2) !important;
    }
    body.app-auth.model-group.change-form .selector-filter input {
      border-radius: 10px !important;
      padding: 8px 14px !important;
      border: 1px solid rgba(148,163,184,.3) !important;
      font-weight: 600 !important;
    }
    body.app-auth.model-group.change-form .selector-filter input:focus {
      border-color: #319189 !important;
      outline: none !important;
    }
    body.app-auth.model-group.change-form .selector select {
      height: 280px !important;
      border: none !important;
      border-radius: 0 !important;
      padding: 12px !important;
      font-size: 13px !important;
    }
    body.app-auth.model-group.change-form .selector ul.selector-chooser {
      align-self: center !important;
      width: 52px !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 10px !important;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f6 100%) !important;
      border: 1px solid rgba(148,163,184,.25) !important;
      border-radius: 14px !important;
      padding: 10px 8px !important;
      transform: none !important;
      box-shadow: 0 4px 12px rgba(15,23,42,.06) !important;
    }
    body.app-auth.model-group.change-form .selector-chooser li {
      padding: 0 !important;
      list-style: none !important;
    }
    body.app-auth.model-group.change-form .selector-add,
    body.app-auth.model-group.change-form .selector-remove {
      width: 36px !important;
      height: 36px !important;
      padding: 0 !important;
      border-radius: 10px !important;
      border: none !important;
      background: #319189 !important;
      color: #fff !important;
      font-size: 0 !important;
      line-height: 1 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      cursor: pointer !important;
      transition: all .2s ease !important;
    }
    body.app-auth.model-group.change-form .selector-add::before {
      content: "→" !important;
      font-size: 18px !important;
      font-weight: 900 !important;
    }
    body.app-auth.model-group.change-form .selector-remove::before {
      content: "←" !important;
      font-size: 18px !important;
      font-weight: 900 !important;
    }
    body.app-auth.model-group.change-form .selector-add:hover,
    body.app-auth.model-group.change-form .selector-remove:hover {
      background: #287a75 !important;
      transform: scale(1.08) !important;
    }
    body.app-auth.model-group.change-form .selector-chooseall,
    body.app-auth.model-group.change-form .selector-clearall {
      border-radius: 10px !important;
      padding: 8px 14px !important;
      font-weight: 800 !important;
      font-size: 12px !important;
      transition: all .2s ease !important;
    }
    body.app-auth.model-group.change-form .selector-chooseall {
      background: rgba(49,145,137,.15) !important;
      color: #1e6b66 !important;
      border: 1px solid rgba(49,145,137,.35) !important;
    }
    body.app-auth.model-group.change-form .selector-clearall {
      background: rgba(239,68,68,.1) !important;
      color: #b91c1c !important;
      border: 1px solid rgba(239,68,68,.25) !important;
    }
    body.app-auth.model-group.change-form #jazzy-actions .btn-primary {
      border-radius: 14px !important;
      padding: 12px 24px !important;
      font-weight: 900 !important;
    }
  </style>
{% endblock %}
