{% extends "cms/base.html" %}

{% block title %}{{ title }} — Smart Library{% endblock %}

{% block content %}
  <section class="mx-auto max-w-4xl px-4 pt-10 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-slate-200 bg-white p-10 shadow-sm dark:border-slate-800 dark:bg-slate-950">
      <div class="text-sm font-semibold text-brand-700 dark:text-brand-200">{{ title }}</div>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">{{ subtitle }}</h1>

      <div class="mt-8 space-y-4 text-sm leading-relaxed text-slate-600 dark:text-slate-300">
        {% for p in content %}
          <p>{{ p }}</p>
        {% endfor %}
      </div>

      <div class="mt-10 flex flex-col gap-3 sm:flex-row">
        <a href="/catalog/" class="inline-flex items-center justify-center rounded-2xl bg-brand-700 px-5 py-3 text-sm font-extrabold text-white shadow-sm hover:bg-brand-800">Katalogu</a>
        <a href="/kontakt/" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-800 shadow-sm hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100 dark:hover:bg-slate-900">Kontakt</a>
      </div>
    </div>
  </section>
{% endblock %}
