# Render Blueprint (plan FREE: pa preDeployCommand).
# Plotëso vetëm në dashboard: SECRET_KEY + DATABASE_URL (Neon).
# ALLOWED_HOSTS / CSRF: vendosen automatikisht nga RENDER_EXTERNAL_URL në settings.py
#
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: smart-library
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # Free tier nuk lejon preDeployCommand; migrimet në çdo start:
    startCommand: python manage.py migrate --noinput && gunicorn smart_library.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
