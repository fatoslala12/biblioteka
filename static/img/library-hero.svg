      <stop offset="1" stop-color="#0EA5A3" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="blur" x="-50" y="-50" width="1000" height="750" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
